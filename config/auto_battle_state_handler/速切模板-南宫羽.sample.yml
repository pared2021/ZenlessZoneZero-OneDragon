template_name: "速切模板-南宫羽"
handlers:
  - states: "[前台-南宫羽]"
    interrupt_states: "[前台-能量, 0, 0.1] & ![前台-南宫羽]"
    sub_handlers:
      - states: "[自定义-终结技被强制释放, 0, 1]"
        operations:
          - operation_template: "南宫羽-终结技"

      - states: "[自定义-黄光切人, 0, 1]"
        operations:
          - operation_template: "通用-支援攻击"

      - states: "[自定义-红光闪避, 0, 1]"
        operations:
          - operation_template: "通用-闪A"

      - states: "[自定义-连携换人, 0, 0.5]"
        operations:
          - operation_template: "通用-连携攻击"

      # 防呆
      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "切人后等待"
        sub_handlers:
          - states: "[按键可用-快速支援, 0, 0.3]"
            operations:
              - op_name: "等待秒数"
                seconds: 0.3
          - states: ""
            operations:
              - op_name: "等待秒数"
                seconds: 0.3

      - states: "[南宫羽-终结技可用]"
        debug_name: "南宫羽-终结技"
        operations:
          - operation_template: "南宫羽-终结技"

      - states: "[南宫羽-重拍]{40, 100}"
        interrupt_states: "[南宫羽-重拍]{0, 39}"
        debug_name: "南宫羽-满重拍长按普攻"
        operations:
          - operation_template: "南宫羽-长按普攻"

      - states: "[南宫羽-特殊技可用]"
        interrupt_states: "![南宫羽-特殊技可用]"
        debug_name: "南宫羽-强化特殊技"
        operations:
          - operation_template: "南宫羽-强化特殊技"

      - states: ""
        debug_name: "南宫羽-默认速切普攻"
        operations:
          - op_name: "设置状态"
            state: "自定义-合轴时间"
          - op_name: "按键-普通攻击"
            post_delay: 0.1
            repeat: 10
