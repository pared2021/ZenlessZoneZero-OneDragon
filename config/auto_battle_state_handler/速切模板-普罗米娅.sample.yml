template_name: "速切模板-普罗米娅"
handlers:
  - states: "[前台-普罗米娅]"
    interrupt_states: "[前台-能量, 0, 0.1] & ![前台-普罗米娅]"
    sub_handlers:
      - states: "[自定义-终结技被强制释放, 0, 1]"
        operations:
          - operation_template: "普罗米娅-终结技"

      - states: "[自定义-红光闪避, 0, 1]"
        sub_handlers:
          - states: "[普罗米娅-特殊技可用]"
            debug_name: "红光特殊技"
            operations:
              - operation_template: "普罗米娅-特殊攻击"
          - states: ""
            debug_name: "红光闪A"
            operations:
              - operation_template: "普罗米娅-闪A"

      - states: "[自定义-黄光切人, 0, 1]"
        operations:
          - operation_template: "普罗米娅-支援攻击"

      - states: "[自定义-连携换人, 0, 0.5]"
        operations:
          - operation_template: "普罗米娅-连携攻击"

      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "切人后等待"
        operations:
          - op_name: "等待秒数"
            seconds: 0.3

      - states: "[普罗米娅-能量]{110, 120}"
        debug_name: "能量太多了"
        operations:
          - operation_template: "普罗米娅-特殊攻击"

      - states: "[普罗米娅-终结技可用] & [自定义-失衡时间, -10, 10]"
        debug_name: "失衡了，开大"
        operations:
          - operation_template: "普罗米娅-终结技"

      - states: "[普罗米娅-终结技可用] & ![自定义-失衡时间, -10, 10] & ![后台-1-击破] & ![后台-2-击破]"
        debug_name: "后台没击破，开大"
        operations:
          - operation_template: "普罗米娅-终结技"

      - states: "[普罗米娅-霜刑]{0, 0} & [自定义-普罗米娅-长按中, -10, 10]"
        debug_name: "0点霜刑结束速切"
        operations:
          - op_name: "清除状态"
            state: "自定义-普罗米娅-长按中"
          - op_name: "清除状态"
            state: "自定义-无视闪光"
          - op_name: "设置状态"
            state: "自定义-合轴时间"

      - states: "[普罗米娅-霜刑]{2, 2} | ([普罗米娅-霜刑]{1, 2} & [自定义-失衡时间, -10, 10])"
        interrupt_states: "[普罗米娅-霜刑]{0, 0} & [前台-能量, 0, 0.1]"
        debug_name: "2点霜刑长按普攻"
        operations:
          - operation_template: "普罗米娅-长按普攻"
          - operation_template: "普罗米娅-长按普攻"
          - operation_template: "普罗米娅-长按普攻"
          - operation_template: "普罗米娅-长按普攻"

      - states: ""
        interrupt_states: "[普罗米娅-霜刑]{2, 2}"
        debug_name: "普通攻击"
        operations:
          - operation_template: "普罗米娅-普通攻击"
          - op_name: "设置状态"
            state: "自定义-合轴时间"
