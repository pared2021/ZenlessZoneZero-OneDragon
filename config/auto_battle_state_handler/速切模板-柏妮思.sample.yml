template_name: "速切模板-柏妮思"
handlers:
  - states: "[前台-柏妮思]"
    interrupt_states: "[前台-能量, 0, 0.1] & ![前台-柏妮思]"
    sub_handlers:
      - states: "[自定义-终结技被强制释放, 0, 1]"
        operations:
          - operation_template: "柏妮思-终结技"

      - states: "[自定义-黄光切人, 0, 1]"
        debug_name: "黄光切人"
        operations:
          - operation_template: "柏妮思-格挡攻击"
          - operation_template: "柏妮思-直接长按特殊攻击"

      - states: "[自定义-红光闪避, 0, 1]"
        debug_name: "红光闪避"
        operations:
          - operation_template: "柏妮思-闪A"

      - states: "[自定义-连携换人, 0, 0.5]"
        debug_name: "连携攻击"
        operations:
          - operation_template: "柏妮思-连携攻击"
          - operation_template: "柏妮思-直接长按特殊攻击"

      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "切人后等待"
        sub_handlers:
          - states: "[按键可用-快速支援, 0, 0.5]"
            debug_name: "快速支援等待"
            operations:
              - operation_template: "柏妮思-直接长按特殊攻击"
          - states: ""
            debug_name: "短暂等待"
            operations:
              - op_name: "等待秒数"
                seconds: 0.3

      - states: "[柏妮思-终结技可用]"
        debug_name: "终结技"
        operations:
          - operation_template: "柏妮思-终结技"


      - states: "[柏妮思-燃点]{100, 100}"
        debug_name: "满了"
        operations:
          - operation_template: "柏妮思-长按普通攻击"

      - states: "[柏妮思-燃点]{80, 100} & [柏妮思-特殊技可用]"
        debug_name: "正常打站场"
        operations:
          - operation_template: "柏妮思-长按普通攻击"

      - states: "[柏妮思-特殊技可用]"
        debug_name: "低燃点单喷接双喷"
        operations:
          - operation_template: "柏妮思-短按单双喷"

      - states: ""
        debug_name: "没电了走吧"
        operations:
          - op_name: "设置状态"
            state_list: ["自定义-合轴时间"]
          - operation_template: "柏妮思-普通攻击"
