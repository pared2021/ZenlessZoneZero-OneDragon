# 终结技：狂点4秒，动画2秒，等待1秒
operations:
  - op_name: "设置状态"
    state: "自定义-失衡时间"
    seconds_add: -2
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 4
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 20
  - op_name: "按键-切换角色"
    agent_name: "爱芮"
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 10
  - op_name: "等待秒数"
    seconds: 1