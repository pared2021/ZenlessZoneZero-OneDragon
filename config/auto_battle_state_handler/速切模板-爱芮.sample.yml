# 文件: 速切模板-爱芮.yml
# 优化版 v9.1：用回了强化特殊技二连

template_name: "速切模板-爱芮"

handlers:
  - states: "[前台-爱芮]"
    sub_handlers:

      # ========== 黄光入场（招架支援）—— 最高优先级 ==========
      - states: "[自定义-黄光切人, 0, 1]"
        debug_name: "黄光支援"
        operations:
          - operation_template: "爱芮-支援攻击"

      # ========== 终结技被强制释放 ==========
      - states: "[自定义-终结技被强制释放, 0, 1]"
        debug_name: "强制终结技"
        operations:
          - operation_template: "爱芮-终结技"

      # ========== 红光闪避 ==========
      - states: "[自定义-红光闪避, 0, 1]"
        debug_name: "红光闪A"
        operations:
          - operation_template: "爱芮-闪A"

      # ========== 连携换人入场 ==========
      - states: "[自定义-连携换人, 0, 0.5]"
        debug_name: "连携入场"
        operations:
          - operation_template: "爱芮-连携攻击"
          - op_name: "等待秒数"
            seconds: 0.7

      # ========== 切人后等待（防抖） ==========
      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "切人后等待"
        operations:
          - op_name: "等待秒数"
            seconds: 0.3

      # ========== 失衡期间决策（核心爆发期） ==========
      - states: "[自定义-失衡时间, -5, 15]"
        debug_name: "爱芮-失衡爆发期"
        sub_handlers:

          # 满应援能量且有大招 → 先打一轮音准，再开大
          - states: "[爱芮-应援能量]{2, 8} & [爱芮-终结技可用]"
            debug_name: "满豆开大爆发"
            operations:
              - operation_template: "爱芮-绝对音准"
              - op_name: "等待秒数"
                seconds: 1
              - operation_template: "爱芮-终结技"
              - op_name: "设置状态"
                state: "自定义-爱芮-妄想时刻"
                seconds: 15

          # 有终结技但能量不足 → 直接开大
          - states: "[爱芮-终结技可用]"
            debug_name: "直接开大起手"
            operations:
              - operation_template: "爱芮-终结技"
              - op_name: "设置状态"
                state: "自定义-爱芮-妄想时刻"
                seconds: 15

          # 有应援能量（≥2）→ 连续下砸
          - states: "[爱芮-应援能量]{2, 8}"
            debug_name: "连续下砸"
            operations:
              - operation_template: "爱芮-绝对音准"

          # 常规能量≥80 → 强化特殊技二连
          - states: "[前台-能量]{40, 120}"
            debug_name: "补能（强化特殊技）"
            operations:
              - operation_template: "爱芮-强化特殊技二连"

          # 应援能量不足2点 → 普攻四段攒豆
          - states: "[爱芮-应援能量]{0, 2}"
            debug_name: "失衡期普攻攒豆"
            operations:
              - operation_template: "爱芮-普攻循环"

          # 保底普攻
          - states: ""
            debug_name: "失衡期保底普攻"
            operations:
              - operation_template: "爱芮-普通攻击"

      # ========== 非失衡期间决策（速切攒能期） ==========
      - states: ""
        debug_name: "爱芮-非失衡速切期"
        sub_handlers:

          # 手动连携提示
          - states: "[自定义-提示-手动连携]"
            debug_name: "手动连携提示"
            operations:
              - op_name: "清除状态"
                state: "自定义-提示-手动连携"

          # 没有击破队友时，有大招直接放
          - states: "[爱芮-终结技可用] & ![后台-1-击破] & ![后台-2-击破]"
            debug_name: "无击破直接开大"
            operations:
              - operation_template: "爱芮-终结技"
              - op_name: "设置状态"
                state: "自定义-爱芮-妄想时刻"
                seconds: 15

          # 非失衡期补豆：能量≥80 打单次强化特殊技
          - states: "[前台-能量]{80, 120}"
            debug_name: "非失衡期补豆"
            operations:
              - operation_template: "爱芮-强化特殊技二连"

          # 非失衡期小爆发：应援能量≥8点
          - states: "[爱芮-应援能量]{8, 8}"
            debug_name: "非失衡小爆发"
            operations:
              - operation_template: "爱芮-绝对音准"

          # 默认：普攻循环攒豆
          - states: ""
            debug_name: "非失衡积攒应援"
            operations:
              - operation_template: "爱芮-普攻循环"
