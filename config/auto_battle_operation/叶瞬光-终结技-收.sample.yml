# 根据动画实测，动画持续6.5秒
operations:
  - op_name: "设置状态"
    state: "自定义-失衡时间"
    seconds_add: -4
  # 终结技动画期间, 失衡不会动
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 6.5
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 20
  - op_name: "按键-切换角色"
    agent_name: "叶瞬光"
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 35
  - op_name: "等待秒数"
    seconds: 1
