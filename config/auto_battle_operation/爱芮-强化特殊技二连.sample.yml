# 文件: 爱芮-强化特殊技二连.sample.yml
# 连续两次强化特殊技，第二次利用技能加速机制，减少按键次数和后摇等待，稍留冗余

operations:
  # ========== 第一次强化特殊技 ==========
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 3.5          # 覆盖两次的总时间
  - op_name: "按键-特殊攻击"
    post_delay: 0.1
    repeat: 14            # 第一次完整次数
  - op_name: "等待秒数"
    seconds: 1
  - op_name: "设置状态"
    state: "自定义-爱芮-应援能量"
    add: 3                # 两次共获得6点应援能量（每次3点）
  
  # ========== 第二次强化特殊技（更快） ==========
  - op_name: "按键-特殊攻击"
    post_delay: 0.1      # 更短的后摇
    repeat: 5             # 减少次数，因为第二次动作更快
  - op_name: "等待秒数"
    seconds: 0.5          # 更短的收尾等待
  
  - op_name: "设置状态"
    state: "自定义-爱芮-应援能量"
    add: 3                # 两次共获得6点应援能量（每次3点）