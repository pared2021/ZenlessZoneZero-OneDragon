# 根据动画实测，动画持续5秒, 第三秒开始可以切人
operations:
  - op_name: "设置状态"
    state: "自定义-失衡时间"
    seconds_add: -1
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 4.5
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 20
  - op_name: "按键-切换角色"
    agent_name: "青衣"
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 15
  - op_name: "等待秒数"
    seconds: 1
