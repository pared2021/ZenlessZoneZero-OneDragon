operations:
  - op_name: "按键-普通攻击-松开"
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 2
  - op_name: "按键-普通攻击-松开"              #这里是第二个按键松开，因为我不确定之前那个按键松开能不能生效，设置按键松开是仿照了雅的模板
  - op_name: "按键-普通攻击"
    post_delay: 0.1
    repeat: 20
  - op_name: "等待秒数"
    seconds: 1
  - op_name: "设置状态"
    state: "自定义-爱芮-应援能量"
    add: 2
  - op_name: "清除状态"
    state: "自定义-动作不打断"