template_name: "速切模板-南宫羽"
handlers:
  - states: "[前台-南宫羽]"
    sub_handlers:
      # ========== 高优先级：系统强制行为 ==========
      - states: "[自定义-终结技被强制释放, 0, 1]"
        operations:
          - operation_template: "南宫羽-终结技"

      - states: "[自定义-黄光切人, 0, 1]"
        debug_name: "南宫羽-黄光支援"
        operations:
          - operation_template: "通用-支援攻击"
          - op_name: "设置状态"
            state: "自定义-黄光切人后摇"
            seconds: 0.5

      - states: "[自定义-红光闪避, 0, 1]"
        operations:
          - operation_template: "通用-闪A"

      - states: "[自定义-连携换人, 0, 0.5]"
        operations:
          - operation_template: "通用-连携攻击"

      # ========== 切人后等待（防呆）==========
      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "切人后等待"
        operations:
          - op_name: "等待秒数"
            seconds: 0.3

      # ========== 失衡期间决策：立即合轴 ==========
      - states: "[自定义-失衡时间, 0, 15]"
        debug_name: "南宫羽-失衡期速切离场"
        operations:
          - op_name: "设置状态"
            state: "自定义-合轴时间"
            seconds: 0.3 # 增加超时，避免状态永久残留
          - operation_template: "通用-切人普通攻击"

      # ========== 终结技==========
      - states: "[南宫羽-终结技可用]"
        debug_name: "南宫羽-终结技"
        operations:
          - operation_template: "南宫羽-终结技"

      # ========== 强化特殊技 ==========
      - states: "[南宫羽-特殊技可用]"
        interrupt_states: "![南宫羽-特殊技可用]"
        debug_name: "南宫羽-强化特殊技"
        operations:
          - operation_template: "南宫羽-强化特殊技"
          - op_name: "设置状态"
            state: "自定义-南宫羽-特殊技后追击"
            seconds: 2

      # 特殊技后的强制追击蓄力（仅当重拍≥80时追击）
      - states: "[自定义-南宫羽-特殊技后追击, 0, 2] & [南宫羽-重拍]{80, 100}"
        debug_name: "南宫羽-特殊技后接蓄力"
        operations:
          - operation_template: "南宫羽-长按普攻"

      # 常规满重拍蓄力，战斗十秒之后，一般很少执行本段了，这一段为式舆防卫战保留，尝试更快而不是更优使用掉资源，在1分钟内干掉初期的小怪
      - states: "[南宫羽-重拍]{40, 100}"
        interrupt_states: "[南宫羽-重拍]{0, 39}"
        debug_name: "南宫羽-满重拍长按普攻"
        operations:
          - operation_template: "南宫羽-长按普攻"

      # 默认普攻，不再设置合轴，由队友控制切入条件，稍微提升站场时间
      - states: ""
        debug_name: "南宫羽-默认普攻"
        operations:
          - op_name: "按键-普通攻击"
            post_delay: 0.1
            repeat: 4
