# 根据动画实测，动画持续5秒, 第三秒开始可以切人
operations:
  - op_name: "设置状态"
    state: "自定义-失衡时间"
    seconds_add: -1
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 3
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 30
  - op_name: "清除状态"
    state: "自定义-异常-火"
  - op_name: "等待秒数"
    seconds: 1
  - op_name: "按键-切换角色-下一个"
  - op_name: "清除状态"
    state_list: ["自定义-合轴时间", "自定义-动作不打断", "自定义-快速支援换人"]
  - op_name: "等待秒数"
    seconds: 1.5